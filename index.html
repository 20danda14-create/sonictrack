<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SonicTrack — Gelişmiş Ses Yönü Bulucu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810;
      --surface: #0d1020;
      --surface2: #131828;
      --border: rgba(0,200,255,0.1);
      --accent: #00c8ff;
      --accent2: #ff4d6d;
      --accent3: #00ff9d;
      --warn: #ffb830;
      --text: #e8f0ff;
      --muted: #4a5580;
      --font-mono: 'Share Tech Mono', monospace;
      --font-sans: 'Exo 2', sans-serif;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px; pointer-events:none; z-index:0;
    }

    .app { position:relative; z-index:1; max-width: 430px; margin: 0 auto; display: flex; flex-direction: column; padding: 0 16px calc(var(--safe-bottom) + 16px); }

    .header { display:flex; align-items:center; justify-content:space-between; padding: 40px 0 15px; }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-badge {
      width:40px; height:40px; background: conic-gradient(from 180deg, #00c8ff, #ff4d6d, #00ff9d, #00c8ff);
      border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative;
    }
    .logo-badge::after { content:''; position:absolute; inset:2px; background:var(--bg); border-radius:8px; }
    .logo-badge svg { z-index:1; width:22px; height:22px; }
    .logo-name { font-weight:900; font-size:20px; letter-spacing:2px; text-transform:uppercase; }
    .logo-name em { color:var(--accent); font-style:normal; }

    .status-badge {
      display:flex; align-items:center; gap:7px; padding:7px 14px; background:var(--surface);
      border:1px solid var(--border); border-radius:100px; font-family:var(--font-mono); font-size:11px; color:var(--muted);
    }
    .status-badge.live { color:var(--accent3); border-color:rgba(0,255,157,.3); }
    .status-badge.live .sdot { background:var(--accent3); box-shadow:0 0 8px var(--accent3); animation:blink 1.2s ease infinite; }
    .sdot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .vol-container {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 15px;
    }
    .vol-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .vol-title { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .vol-value { font-family: var(--font-mono); font-size: 13px; color: var(--accent3); font-weight: bold; }
    .vol-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .vol-fill { height: 100%; background: linear-gradient(90deg, var(--accent3) 75%, var(--warn) 90%, var(--accent2) 100%); width: 0%; transition: width 0.04s ease-out; }

    .radar-wrap { position:relative; width:280px; height:280px; margin: 0 auto 15px; }
    #radarCanvas { position:absolute; inset:0; width:100%; height:100%; border-radius:50%; }

    .needle-pivot { position:absolute; top:50%; left:50%; width:0; height:0; transform-origin:0 0; transition: transform .1s ease-out; }
    .needle-arm {
      position:absolute; bottom:0; left:-2px; width:4px; height:110px; border-radius:4px 4px 0 0;
      background: linear-gradient(to top, transparent, var(--accent)); filter: drop-shadow(0 0 6px var(--accent));
    }
    .needle-tip-dot { position:absolute; top:-5px; left:-5px; width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }

    .rlabel { position:absolute; font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--muted); transform:translate(-50%,-50%); }
    .rlabel.top { top:15px; left:50%; color:var(--accent); }
    .rlabel.bottom { bottom:2px; left:50%; }
    .rlabel.left { top:50%; left:15px; }
    .rlabel.right { top:50%; right:2px; }

    .readout { text-align:center; margin-bottom:15px; }
    .readout-num { font-family:var(--font-mono); font-size:55px; font-weight:400; line-height:1; color:var(--text); }
    .readout-num.hot { color:var(--accent); text-shadow:0 0 20px rgba(0,200,255,0.4); }
    .readout-deg { font-size:24px; color:var(--muted); }
    .readout-dir { font-size:14px; font-weight:600; color:var(--accent3); margin-top:6px; min-height:20px; }

    .conf-track { height:4px; background:var(--surface2); border-radius:4px; margin:0 20px 15px; overflow:hidden; }
    .conf-fill { height:100%; background:linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3)); transition:width .1s; width:0%; }

    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:15px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 5px; text-align:center; }
    .stat-lbl { font-family:var(--font-mono); font-size:9px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    .stat-val { font-family:var(--font-mono); font-size:14px; color:var(--text); }

    .spectrum-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-bottom:15px; }
    .spectrum-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .spectrum-title { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; }
    .mode-tag { font-family:var(--font-mono); font-size:9px; padding:2px 8px; border-radius:100px; border:1px solid rgba(0,200,255,.2); color:var(--accent); font-weight: bold; }
    #specCanvas { width:100%; height:55px; display:block; }

    .history-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; }
    .history-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .history-title { font-family:var(--font-mono); font-size:10px; color:var(--muted); text-transform:uppercase; }
    .history-list { display:flex; flex-direction:column; gap:4px; max-height:110px; overflow-y:auto; }
    .h-row { display:flex; align-items:center; justify-content:space-between; font-family:var(--font-mono); font-size:11px; padding:5px 8px; background:var(--surface2); border-radius:6px; }
    .h-time { color:var(--muted); }
    .h-angle { color:var(--accent); font-weight:700; }
    .h-conf { color:var(--accent3); }
    .empty-hint { text-align:center; color:var(--muted); font-size:11px; padding:10px 0; font-family:var(--font-mono); }

    .btn-row { display:flex; gap:10px; margin-top:15px; }
    .btn-primary {
      flex:1; padding:16px; font-family:var(--font-sans); font-size:14px; font-weight:700; letter-spacing:1px;
      text-transform:uppercase; background:linear-gradient(135deg,#0066ff,var(--accent)); color:#fff; border:none;
      border-radius:var(--radius); cursor:pointer; transition:all .2s;
    }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary.stop { background:linear-gradient(135deg,#bd2130,var(--accent2)); }
    .btn-secondary { padding:16px; font-family:var(--font-sans); font-size:13px; color:var(--muted); background:transparent; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; }

    .toast {
      position:fixed; top:20px; right:20px; background:rgba(0,255,157,.15); border:1px solid var(--accent3);
      color:var(--accent3); font-family:var(--font-mono); font-size:11px; padding:6px 12px; border-radius:100px;
      opacity:0; transform:translateY(-5px); transition:all .3s; pointer-events:none; z-index:1000;
    }
    .toast.show { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<div class="toast" id="toast">✓ E-Tabloya Kaydedildi</div>

<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M6.3 6.3a8 8 0 0 0 0 11.4M17.7 6.3a8 8 0 0 1 0 11.4"/>
        </svg>
      </div>
      <div class="logo-name">Sonic<em>Track</em></div>
    </div>
    <div class="status-badge" id="statusBadge"><div class="sdot"></div><span id="statusTxt">Hazır</span></div>
  </div>

  <div class="vol-container">
    <div class="vol-hdr">
      <div class="vol-title">Ses Şiddeti</div>
      <div class="vol-value" id="volNum">0 / 100 (Zirve: 0)</div>
    </div>
    <div class="vol-track">
      <div class="vol-fill" id="volFill"></div>
    </div>
  </div>

  <div class="radar-wrap">
    <canvas id="radarCanvas" width="280" height="280"></canvas>
    <div class="needle-pivot" id="needlePivot"><div class="needle-arm"><div class="needle-tip-dot"></div></div></div>
    <div class="rlabel top">ÖN</div>
    <div class="rlabel bottom">ARKA</div>
    <div class="rlabel left">SOL</div>
    <div class="rlabel right">SAĞ</div>
  </div>

  <div class="readout">
    <div><span class="readout-num" id="angleNum">--</span><span class="readout-deg">°</span></div>
    <div class="readout-dir" id="dirLabel">—</div>
  </div>

  <div class="conf-track"><div class="conf-fill" id="confFill"></div></div>

  <div class="stats">
    <div class="stat-card"><div class="stat-lbl">GÜVEN SKORU</div><div class="stat-val" id="sv1">—</div></div>
    <div class="stat-card"><div class="stat-lbl">ZİRVE SEVİYE</div><div class="stat-val" id="sv2">—</div></div>
    <div class="stat-card"><div class="stat-lbl">TOPLAM KAYIT</div><div class="stat-val" id="sv3">0</div></div>
  </div>

  <div class="spectrum-wrap">
    <div class="spectrum-hdr">
      <div class="spectrum-title">Frekans Spektrumu</div>
      <div class="mode-tag" id="modeTag">BEKLENİYOR</div>
    </div>
    <canvas id="specCanvas" height="55"></canvas>
  </div>

  <div class="history-wrap">
    <div class="history-hdr">
      <div class="history-title">Son Tespitler</div>
    </div>
    <div class="history-list" id="histList"><div class="empty-hint">Veri bekleniyor...</div></div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btnMain" onclick="toggleMic()">▶ Mikrofonu Başlat</button>
    <button class="btn-secondary" onclick="clearLogs()">Temizle</button>
  </div>

</div>

<script>
let audioCtx = null, stream = null, loopTimer = null;
let source = null, splitter = null;
let analyserL = null, analyserR = null, analyserM = null;
let isRunning = false, isStereo = false;
let totalSaved = 0, lastLogTs = 0;
let historyData = [];
let smoothAngle = 90, smoothConf = 0, smoothVol = 0;
let maxPeakLevel = 0;

const ANGLE_BUF_SIZE = 6;
let angleBuf = Array(ANGLE_BUF_SIZE).fill(90);
let angleBufIdx = 0;

const radarCvs = document.getElementById('radarCanvas');
const radarCtx = radarCvs.getContext('2d');
const specCvs = document.getElementById('specCanvas');
const specCtx = specCvs.getContext('2d');

function drawRadarBackground() {
  const cx = 140, cy = 140, R = 120;
  radarCtx.clearRect(0, 0, 280, 280);
  radarCtx.beginPath(); radarCtx.arc(cx, cy, R, 0, Math.PI*2);
  radarCtx.fillStyle = 'rgba(0,200,255,0.02)'; radarCtx.fill();
  [0.4, 0.7, 1].forEach(f => {
    radarCtx.beginPath(); radarCtx.arc(cx, cy, R*f, 0, Math.PI*2);
    radarCtx.strokeStyle = `rgba(0,200,255,${f===1?0.2:0.06})`; radarCtx.stroke();
  });
  radarCtx.strokeStyle = 'rgba(0,200,255,0.06)';
  [[cx,cy-R,cx,cy+R],[cx-R,cy,cx+R,cy]].forEach(([x1,y1,x2,y2])=>{
    radarCtx.beginPath(); radarCtx.moveTo(x1,y1); radarCtx.lineTo(x2,y2); radarCtx.stroke();
  });
}
drawRadarBackground();

function mainLoop() {
  if (!isRunning) return;

  let rms = 0;
  let targetAngle = 90;
  let confidence = 0;

  if (isStereo) {
    const timeDataL = new Float32Array(analyserL.fftSize);
    const timeDataR = new Float32Array(analyserR.fftSize);
    analyserL.getFloatTimeDomainData(timeDataL);
    analyserR.getFloatTimeDomainData(timeDataR);

    const freqDataL = new Float32Array(analyserL.frequencyBinCount);
    analyserL.getFloatFrequencyData(freqDataL);
    drawSpectrumGraph(freqDataL);

    let sumL = 0, sumR = 0;
    for (let i = 0; i < timeDataL.length; i++) {
      sumL += timeDataL[i] * timeDataL[i];
      sumR += timeDataR[i] * timeDataR[i];
    }
    rms = Math.sqrt((sumL + sumR) / (2 * timeDataL.length));

    if (rms > 0.005) {
      let maxLag = 20;
      let bestLag = 0;
      let maxVal = -Infinity;
      let len = timeDataL.length;

      for (let lag = -maxLag; lag <= maxLag; lag++) {
        let correlation = 0;
        for (let i = 0; i < len; i++) {
          let rIdx = i + lag;
          if (rIdx >= 0 && rIdx < len) {
            correlation += timeDataL[i] * timeDataR[rIdx];
          }
        }
        if (correlation > maxVal) {
          maxVal = correlation;
          bestLag = lag;
        }
      }

      let lagRatio = bestLag / maxLag;
      targetAngle = 90 + (lagRatio * 85); 
      confidence = Math.min(0.98, rms * 35);
    }
  } else {
    const timeDataM = new Float32Array(analyserM.fftSize);
    const freqDataM = new Float32Array(analyserM.frequencyBinCount);
    analyserM.getFloatTimeDomainData(timeDataM);
    analyserM.getFloatFrequencyData(freqDataM);
    drawSpectrumGraph(freqDataM);

    let sumM = 0;
    for (let i = 0; i < timeDataM.length; i++) sumM += timeDataM[i] * timeDataM[i];
    rms = Math.sqrt(sumM / timeDataM.length);

    if (rms > 0.005) {
      let wSum = 0, sumF = 0;
      for (let i = 3; i < Math.min(freqDataM.length, 180); i++) {
        const mag = Math.pow(10, freqDataM[i] / 20);
        wSum += i * mag; sumF += mag;
      }
      const centroid = sumF > 0 ? wSum / sumF : 40;
      let normCentroid = (centroid - 5) / (80 - 5);
      normCentroid = Math.max(0, Math.min(1, normCentroid));
      
      targetAngle = 15 + (normCentroid * 150);
      confidence = Math.min(0.95, rms * 20);
    }
  }

  let currentVolInt = Math.min(100, Math.max(0, Math.round(rms * 550)));
  if (currentVolInt > maxPeakLevel) {
    maxPeakLevel = currentVolInt;
  }

  smoothVol += (currentVolInt - smoothVol) * 0.3;
  document.getElementById('volFill').style.width = Math.round(smoothVol) + '%';
  document.getElementById('volNum').textContent = `${Math.round(smoothVol)} / 100 (Zirve: ${maxPeakLevel})`;

  drawRadarBackground();

  if (rms > 0.005) {
    angleBuf[angleBufIdx % ANGLE_BUF_SIZE] = targetAngle;
    angleBufIdx++;
    const sorted = [...angleBuf].sort((a, b) => a - b);
    const medAngle = sorted[Math.floor(ANGLE_BUF_SIZE / 2)];

    smoothAngle += (medAngle - smoothAngle) * 0.25;
    smoothConf += (confidence - smoothConf) * 0.25;

    document.getElementById('needlePivot').style.transform = `rotate(${smoothAngle - 90}deg)`;
    document.getElementById('angleNum').textContent = Math.round(smoothAngle);
    document.getElementById('angleNum').classList.toggle('hot', smoothConf > 0.25);
    document.getElementById('confFill').style.width = Math.round(smoothConf * 100) + '%';
    
    document.getElementById('sv1').textContent = '%' + Math.round(smoothConf * 100);
    document.getElementById('sv2').textContent = maxPeakLevel + ' Pts';
    document.getElementById('dirLabel').textContent = dirText(smoothAngle);

    if (smoothConf > 0.18 && currentVolInt > 2) {
      const now = Date.now();
      if (now - lastLogTs > 750) {
        lastLogTs = now;
        pushToGoogleSheet(smoothAngle, smoothConf);
      }
    }
  } else {
    document.getElementById('angleNum').classList.remove('hot');
    document.getElementById('statusTxt').textContent = 'Dinleniyor...';
    document.getElementById('confFill').style.width = '0%';
  }

  loopTimer = setTimeout(mainLoop, 80);
}

function dirText(a) {
  if (a < 35)  return '◀◀ Sol Yön';
  if (a < 75)  return '◀ Ön Sol Sektör';
  if (a < 105) return '↑ Doğrudan Karşı';
  if (a < 145) return 'Ön Sağ Sektör ▶';
  return 'Sağ Yön ▶▶';
}

function drawSpectrumGraph(freqData) {
  const W = specCvs.width, H = specCvs.height;
  specCtx.clearRect(0,0,W,H);
  if(!freqData) return;

  const bins = Math.min(freqData.length, 100);
  const step = W / bins;
  specCtx.fillStyle = 'rgba(0, 200, 255, 0.4)';
  
  for (let i = 0; i < bins; i++) {
    const norm = (freqData[i] + 140) / 140;
    const barH = Math.max(2, norm * H);
    specCtx.fillRect(i * step, H - barH, step - 1, barH);
  }
}

function pushToGoogleSheet(angle, conf) {
  const timeStr = new Date().toLocaleTimeString('tr-TR');
  const rAngle = Math.round(angle);
  const rConf = Math.round(conf * 100);

  const entry = { time: timeStr, angle: rAngle, conf: rConf };
  historyData.unshift(entry);
  if(historyData.length > 30) historyData.pop();
  
  totalSaved++;
  document.getElementById('sv3').textContent = totalSaved;
  updateHistoryUI();

  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(() => {
        const t = document.getElementById('toast');
        t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1200);
      })
      .kaydetSesYonu(rAngle, (conf).toFixed(3), 0, timeStr);
  }
}

function updateHistoryUI() {
  const container = document.getElementById('histList');
  if(historyData.length === 0) {
    container.innerHTML = '<div class="empty-hint">Veri bekleniyor...</div>';
    return;
  }
  container.innerHTML = historyData.map(h => `
    <div class="h-row">
      <span class="h-time">${h.time}</span>
      <span class="h-angle">${h.angle}°</span>
      <span class="h-conf">%${h.conf} Güven</span>
    </div>
  `).join('');
}

function clearLogs() {
  historyData = []; totalSaved = 0; maxPeakLevel = 0;
  document.getElementById('sv3').textContent = '0';
  document.getElementById('volNum').textContent = '0 / 100 (Zirve: 0)';
  document.getElementById('sv2').textContent = '—';
  updateHistoryUI();
}

async function toggleMic() {
  if (isRunning) {
    isRunning = false;
    clearTimeout(loopTimer);
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(audioCtx) audioCtx.close();
    
    document.getElementById('btnMain').textContent = '▶ Mikrofonu Başlat';
    document.getElementById('btnMain').classList.remove('stop');
    document.getElementById('statusBadge').classList.remove('live');
    document.getElementById('statusTxt').textContent = 'Hazır';
    document.getElementById('volFill').style.width = '0%';
    document.getElementById('volNum').textContent = '0 / 100 (Zirve: 0)';
    document.getElementById('sv1').textContent = '—';
    document.getElementById('sv2').textContent = '—';
    document.getElementById('angleNum').textContent = '--';
    document.getElementById('dirLabel').textContent = '—';
    return;
  }

  const btn = document.getElementById('btnMain');
  btn.textContent = 'Bağlanıyor...';

  try {
    // KADEMELİ ERİŞİM SİSTEMİ: Safari ve iframe huysuzluğunu ezmek için kademeli deneme
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: { ideal: 2 } }
      });
    } catch (safariErr) {
      // Gelişmiş ayar reddedilirse en düz ve ham mikrofon isteğine geri dön
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // iOS Safari uyku modunu (suspended) zorla uyandır
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    source = audioCtx.createMediaStreamSource(stream);
    
    const track = stream.getAudioTracks()[0];
    const settings = track ? track.getSettings() : {};
    isStereo = settings.channelCount && settings.channelCount >= 2;

    if (isStereo) {
      splitter = audioCtx.createChannelSplitter(2);
      source.connect(splitter);

      analyserL = audioCtx.createAnalyser();
      analyserR = audioCtx.createAnalyser();
      analyserL.fftSize = 2048;
      analyserR.fftSize = 2048;

      splitter.connect(analyserL, 0);
      splitter.connect(analyserR, 1);

      document.getElementById('modeTag').textContent = 'STEREO AKTİF';
      document.getElementById('modeTag').style.color = 'var(--accent3)';
      document.getElementById('modeTag').style.borderColor = 'var(--accent3)';
    } else {
      analyserM = audioCtx.createAnalyser();
      analyserM.fftSize = 2048;
      source.connect(analyserM);

      document.getElementById('modeTag').textContent = 'MONO (TON ANALİZİ)';
      document.getElementById('modeTag').style.color = 'var(--warn)';
      document.getElementById('modeTag').style.borderColor = 'var(--warn)';
    }

    isRunning = true;
    btn.textContent = '■ Durdur';
    btn.classList.add('stop');
    document.getElementById('statusBadge').classList.add('live');
    document.getElementById('statusTxt').textContent = 'AKUSTİK AKTİF';

    mainLoop();

  } catch (err) {
    alert('Mikrofon bağlantı hatası! İzinleri kontrol edin. Hata: ' + err.message);
    btn.textContent = '▶ Mikrofonu Başlat';
  }
}
</script>
