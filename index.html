<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SonicTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04060f;
  --s1: #080c1a;
  --s2: #0c1224;
  --border: rgba(0,210,255,0.08);
  --border2: rgba(0,210,255,0.18);
  --a: #00d2ff;
  --a2: #ff3c5f;
  --a3: #00ffaa;
  --warn: #ffcc44;
  --text: #ddeeff;
  --muted: #3a4a6a;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
  --r: 10px;
  --sab: env(safe-area-inset-bottom, 0px);
  --sat: env(safe-area-inset-top, 0px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body { height:100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Animated grid bg */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,210,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Top atmospheric glow */
body::after {
  content:''; position:fixed; top:-80px; left:50%; transform:translateX(-50%);
  width:500px; height:300px; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse, rgba(0,120,255,0.07) 0%, transparent 70%);
}

.app {
  position:relative; z-index:1;
  max-width:430px; margin:0 auto;
  padding: calc(var(--sat) + 16px) 14px calc(var(--sab) + 24px);
  display:flex; flex-direction:column; gap:10px;
}

/* ── HEADER ── */
.header { display:flex; align-items:center; justify-content:space-between; padding: 4px 0 4px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon {
  width:38px; height:38px; border-radius:9px;
  background: linear-gradient(135deg, #003366, #0066cc);
  border: 1px solid rgba(0,180,255,0.3);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 16px rgba(0,100,255,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
}
.logo-icon svg { width:20px; height:20px; }
.logo-name { font-size:22px; font-weight:900; letter-spacing:3px; text-transform:uppercase; }
.logo-name em { color:var(--a); font-style:normal; }

.status-pill {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:100px;
  background:var(--s1); border:1px solid var(--border);
  font-family:var(--mono); font-size:10px; color:var(--muted);
  transition: all .3s;
}
.status-pill.live {
  color:var(--a3); border-color:rgba(0,255,170,0.25);
  background:rgba(0,255,170,0.05);
}
.sdot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.status-pill.live .sdot { animation:pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }

/* ── GOOGLE SHEETS CONFIG ── */
.sheet-config {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:12px 14px; display:flex; flex-direction:column; gap:8px;
}
.sheet-config-hdr { display:flex; align-items:center; justify-content:space-between; }
.cfg-title { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.cfg-badge {
  font-family:var(--mono); font-size:9px; padding:2px 8px;
  border-radius:100px; border:1px solid var(--border2); color:var(--muted);
  transition: all .3s;
}
.cfg-badge.connected { color:var(--a3); border-color:rgba(0,255,170,0.3); }
.url-row { display:flex; gap:8px; }
.url-input {
  flex:1; background:var(--s2); border:1px solid var(--border2);
  border-radius:7px; padding:8px 10px;
  font-family:var(--mono); font-size:10px; color:var(--text);
  outline:none; min-width:0;
  transition: border-color .2s;
}
.url-input:focus { border-color:var(--a); }
.url-input::placeholder { color:var(--muted); }
.btn-save {
  padding:8px 14px; background:linear-gradient(135deg,#003399,#0055cc);
  border:none; border-radius:7px; font-family:var(--mono); font-size:10px;
  color:var(--a); cursor:pointer; white-space:nowrap;
  transition: all .2s;
}
.btn-save:active { transform:scale(.96); }

/* ── VOL BAR ── */
.vol-box {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:10px 12px;
}
.vol-hdr { display:flex; justify-content:space-between; margin-bottom:6px; }
.vol-label { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.vol-num { font-family:var(--mono); font-size:11px; color:var(--a3); }
.vol-track { height:6px; background:var(--s2); border-radius:3px; overflow:hidden; }
.vol-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--a3), #00cc88 60%, var(--warn) 85%, var(--a2) 100%);
  transition: width 0.05s ease-out;
  border-radius:3px;
}

/* ── RADAR ── */
.radar-section { position:relative; }
.radar-wrap {
  position:relative; width:270px; height:270px;
  margin:0 auto;
}
#radarCanvas { position:absolute; inset:0; width:100%; height:100%; }

/* Cardinal labels */
.rlabel {
  position:absolute; font-family:var(--mono); font-size:10px; font-weight:700;
  transform:translate(-50%,-50%); pointer-events:none; user-select:none;
}
.rlabel.N { top:10px; left:50%; color:var(--a); }
.rlabel.S { bottom:2px; left:50%; color:var(--muted); }
.rlabel.W { top:50%; left:10px; color:var(--muted); }
.rlabel.E { top:50%; right:2px; color:var(--muted); }

/* SVG needle overlay */
#needleSvg {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none;
}

/* ── ANGLE READOUT ── */
.readout {
  text-align:center; padding:4px 0;
}
.angle-display {
  font-family:var(--mono); font-size:60px; line-height:1;
  color:var(--text); letter-spacing:-2px;
  transition: color .2s;
}
.angle-display.hot { color:var(--a); text-shadow:0 0 30px rgba(0,210,255,0.35); }
.angle-unit { font-size:28px; color:var(--muted); }
.dir-label {
  font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:2px;
  color:var(--a3); margin-top:4px; min-height:18px; text-transform:uppercase;
}

/* Confidence bar */
.conf-track { height:3px; background:var(--s2); border-radius:2px; margin:0 24px; overflow:hidden; }
.conf-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--a2), var(--a), var(--a3));
  transition:width .12s;
}

/* ── STATS GRID ── */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.stat {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:10px 6px; text-align:center;
}
.stat-lbl { font-family:var(--mono); font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
.stat-val { font-family:var(--mono); font-size:15px; color:var(--text); }

/* ── SPECTRUM ── */
.spec-box {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:10px 12px;
}
.spec-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.spec-title { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.mode-tag {
  font-family:var(--mono); font-size:8px; padding:2px 8px;
  border-radius:100px; border:1px solid rgba(0,210,255,.2);
  color:var(--a); font-weight:700; letter-spacing:1px;
  transition: color .3s, border-color .3s;
}
#specCanvas { width:100%; height:50px; display:block; border-radius:4px; }

/* ── HISTORY ── */
.hist-box {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:10px 12px;
}
.hist-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.hist-title { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.sync-indicator {
  font-family:var(--mono); font-size:8px; color:var(--muted);
  display:flex; align-items:center; gap:4px;
}
.sync-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); transition:all .3s; }
.sync-dot.syncing { background:var(--a3); box-shadow:0 0 6px var(--a3); animation:pulse .8s ease infinite; }
.hist-list { display:flex; flex-direction:column; gap:3px; max-height:120px; overflow-y:auto; }
.h-row {
  display:flex; align-items:center; justify-content:space-between;
  font-family:var(--mono); font-size:10px;
  padding:5px 8px; background:var(--s2); border-radius:6px;
  border-left:2px solid transparent;
  transition: border-color .2s;
}
.h-row.new { border-left-color:var(--a3); animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-4px)} to{opacity:1;transform:none} }
.h-time { color:var(--muted); }
.h-angle { color:var(--a); font-weight:700; }
.h-conf { color:var(--a3); }
.h-src { color:var(--warn); font-size:8px; }
.empty-hint { text-align:center; color:var(--muted); font-size:10px; padding:14px 0; font-family:var(--mono); }

/* ── BUTTONS ── */
.btn-row { display:flex; gap:10px; margin-top:4px; }
.btn-main {
  flex:1; padding:16px;
  font-family:var(--sans); font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  background:linear-gradient(135deg, #003399, #0066dd);
  color:#fff; border:none; border-radius:var(--r); cursor:pointer;
  box-shadow:0 4px 20px rgba(0,80,220,0.35);
  transition: all .2s;
  -webkit-appearance:none;
}
.btn-main:active { transform:scale(.98); box-shadow:0 2px 10px rgba(0,80,220,0.2); }
.btn-main.stop {
  background:linear-gradient(135deg, #7a0015, #cc1133);
  box-shadow:0 4px 20px rgba(180,0,50,0.35);
}
.btn-sec {
  padding:16px 18px;
  font-family:var(--sans); font-size:13px; font-weight:600; letter-spacing:1px;
  color:var(--muted); background:transparent;
  border:1px solid var(--border); border-radius:var(--r);
  cursor:pointer; text-transform:uppercase;
  transition: all .2s;
}
.btn-sec:active { color:var(--text); border-color:var(--border2); }

/* ── TOAST ── */
.toast {
  position:fixed; top:calc(var(--sat) + 14px); left:50%; transform:translateX(-50%) translateY(-4px);
  background:rgba(0,255,170,0.1); border:1px solid rgba(0,255,170,0.35);
  color:var(--a3); font-family:var(--mono); font-size:10px;
  padding:6px 16px; border-radius:100px;
  opacity:0; transition:all .3s; pointer-events:none; z-index:1000;
  white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { background:rgba(255,60,95,0.1); border-color:rgba(255,60,95,0.35); color:var(--a2); }

/* ── ALERT BOX ── */
.alert-box {
  background: rgba(255,180,0,0.07); border:1px solid rgba(255,180,0,0.2);
  border-radius:var(--r); padding:10px 14px;
  font-family:var(--mono); font-size:10px; color:var(--warn);
  line-height:1.7; display:none;
}
.alert-box.show { display:block; }

/* ── ORIENTATION PANEL ── */
.orient-panel {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--r);
  padding:10px 14px; display:flex; align-items:center; gap:12px;
}
.orient-viz {
  flex-shrink:0; width:44px; height:44px; position:relative;
}
#orientCanvas { width:44px; height:44px; display:block; }
.orient-info { flex:1; min-width:0; }
.orient-mode {
  font-family:var(--mono); font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  transition: color .4s;
}
.orient-mode.horiz { color:var(--a); }
.orient-mode.vert  { color:var(--a3); }
.orient-mode.flat  { color:var(--warn); }
.orient-angles {
  font-family:var(--mono); font-size:9px; color:var(--muted);
  margin-top:3px; letter-spacing:.5px;
}
.orient-perm {
  font-family:var(--mono); font-size:9px; color:var(--warn);
  margin-top:3px;
  display:none;
}
.orient-perm.show { display:block; }
.btn-perm {
  font-family:var(--mono); font-size:9px; color:var(--a);
  background:transparent; border:1px solid var(--border2);
  border-radius:5px; padding:3px 8px; cursor:pointer;
  margin-top:5px; transition:all .2s;
}
.btn-perm:active { background:rgba(0,210,255,0.1); }

/* ── RADAR LABEL TRANSITIONS ── */
.rlabel { transition: opacity .4s, color .4s; }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="1.8">
          <circle cx="12" cy="12" r="2.5"/>
          <path d="M6.5 6.5a8 8 0 0 0 0 11"/>
          <path d="M17.5 6.5a8 8 0 0 1 0 11"/>
          <path d="M3.5 3.5a15 15 0 0 0 0 17"/>
          <path d="M20.5 3.5a15 15 0 0 1 0 17"/>
        </svg>
      </div>
      <div class="logo-name">Sonic<em>Track</em></div>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="sdot"></div>
      <span id="statusTxt">Hazır</span>
    </div>
  </div>

  <!-- GOOGLE SHEETS CONFIG -->
  <div class="sheet-config">
    <div class="sheet-config-hdr">
      <div class="cfg-title">Google Sheets Webhook</div>
      <div class="cfg-badge" id="cfgBadge">Bağlı Değil</div>
    </div>
    <div class="url-row">
      <input class="url-input" id="sheetUrl" type="url"
        placeholder="https://script.google.com/macros/s/…/exec"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button class="btn-save" onclick="saveSheetUrl()">Kaydet</button>
    </div>
  </div>

  <!-- ALERT -->
  <div class="alert-box" id="alertBox"></div>

  <!-- ORIENTATION PANEL -->
  <div class="orient-panel">
    <div class="orient-viz">
      <canvas id="orientCanvas" width="88" height="88"></canvas>
    </div>
    <div class="orient-info">
      <div class="orient-mode" id="orientMode">YÖN BEKLENİYOR</div>
      <div class="orient-angles" id="orientAngles">α:— β:— γ:—</div>
      <div class="orient-perm" id="orientPerm">iOS izni gerekli</div>
      <button class="btn-perm" id="btnPerm" onclick="requestOrientPerm()" style="display:none">
        📐 Yönelim İzni Ver
      </button>
    </div>
  </div>

  <!-- VOL -->
  <div class="vol-box">
    <div class="vol-hdr">
      <div class="vol-label">Ses Şiddeti (RMS)</div>
      <div class="vol-num" id="volNum">— / — (Zirve: —)</div>
    </div>
    <div class="vol-track"><div class="vol-fill" id="volFill"></div></div>
  </div>

  <!-- RADAR -->
  <div class="radar-section">
    <div class="radar-wrap">
      <canvas id="radarCanvas" width="270" height="270"></canvas>
      <svg id="needleSvg" viewBox="0 0 270 270" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Needle: rotates around center 135,135 -->
        <g id="needleGroup" transform="rotate(0, 135, 135)">
          <!-- Shaft -->
          <line x1="135" y1="135" x2="135" y2="30"
            stroke="url(#needleGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
          <!-- Tip arrowhead -->
          <polygon points="135,22 130,36 140,36" fill="var(--a)" filter="url(#glow)"/>
          <!-- Center dot -->
          <circle cx="135" cy="135" r="5" fill="var(--a)" opacity="0.9" filter="url(#glow)"/>
          <circle cx="135" cy="135" r="2.5" fill="var(--bg)"/>
        </g>
        <defs>
          <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--a)" stop-opacity="1"/>
            <stop offset="100%" stop-color="var(--a)" stop-opacity="0.1"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="rlabel N" id="rl_N">ÖN</div>
      <div class="rlabel S" id="rl_S">ARKA</div>
      <div class="rlabel W" id="rl_W">SOL</div>
      <div class="rlabel E" id="rl_E">SAĞ</div>
    </div>
  </div>

  <!-- ANGLE READOUT -->
  <div class="readout">
    <div><span class="angle-display" id="angleNum">--</span><span class="angle-unit">°</span></div>
    <div class="dir-label" id="dirLabel">—</div>
  </div>
  <div class="conf-track"><div class="conf-fill" id="confFill"></div></div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Güven Skoru</div><div class="stat-val" id="sv1">—</div></div>
    <div class="stat"><div class="stat-lbl">Zirve Seviye</div><div class="stat-val" id="sv2">—</div></div>
    <div class="stat"><div class="stat-lbl">Toplam Kayıt</div><div class="stat-val" id="sv3">0</div></div>
  </div>

  <!-- SPECTRUM -->
  <div class="spec-box">
    <div class="spec-hdr">
      <div class="spec-title">Frekans Spektrumu</div>
      <div class="mode-tag" id="modeTag">BEKLENİYOR</div>
    </div>
    <canvas id="specCanvas" height="50"></canvas>
  </div>

  <!-- HISTORY -->
  <div class="hist-box">
    <div class="hist-hdr">
      <div class="hist-title">Son Tespitler</div>
      <div class="sync-indicator">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncTxt">—</span>
      </div>
    </div>
    <div class="hist-list" id="histList"><div class="empty-hint">Veri bekleniyor...</div></div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="btn-main" id="btnMain" onclick="toggleMic()">▶ Mikrofonu Başlat</button>
    <button class="btn-sec" onclick="clearLogs()">Temizle</button>
  </div>

</div>

<script>
'use strict';

// ─── STATE ───────────────────────────────────────────────────────────────────
let audioCtx = null, micStream = null, rafId = null;
let srcNode = null, splitterNode = null;
let anlL = null, anlR = null, anlM = null;
let isRunning = false, isStereo = false;
let totalSaved = 0, lastLogTs = 0;
let historyData = [];
let maxPeakLevel = 0;
let sheetUrl = '';
let syncPending = false;

// Smoothed display values
let sAngle = 0;   // 0 = left, 90 = front, 180 = right
let sConf  = 0;
let sVol   = 0;

// Angle smoothing ring buffer (median filter)
const BUF = 8;
const angleBuf = new Float32Array(BUF).fill(90);
let bufIdx = 0;

// Canvas refs
const RC = document.getElementById('radarCanvas');
const RCX = RC.getContext('2d');
const SC = document.getElementById('specCanvas');
const SCX = SC.getContext('2d');
const NEEDLE_G = document.getElementById('needleGroup');

// ─── SHEET URL ───────────────────────────────────────────────────────────────
function saveSheetUrl() {
  const val = document.getElementById('sheetUrl').value.trim();
  if (!val.startsWith('https://script.google.com')) {
    showToast('❌ Geçersiz Apps Script URL', true);
    return;
  }
  sheetUrl = val;
  localStorage.setItem('sonictrack_url', val);
  const badge = document.getElementById('cfgBadge');
  badge.textContent = '✓ Bağlandı';
  badge.classList.add('connected');
  showToast('✓ URL kaydedildi');
}

// ─── RADAR BACKGROUND ────────────────────────────────────────────────────────
function drawRadar(highlightAngle, conf) {
  const W = 270, H = 270, cx = 135, cy = 135;
  RCX.clearRect(0, 0, W, H);

  // Sweep arc (direction highlight)
  if (conf > 0.05) {
    const rad = ((highlightAngle - 90) * Math.PI) / 180;
    const spread = (0.25 + conf * 0.3);
    const grad = RCX.createConicalGradient ? null : null;

    RCX.save();
    RCX.beginPath();
    RCX.moveTo(cx, cy);
    RCX.arc(cx, cy, 115, rad - spread, rad + spread);
    RCX.closePath();
    const sweepGrad = RCX.createRadialGradient(cx, cy, 0, cx, cy, 115);
    sweepGrad.addColorStop(0, `rgba(0,210,255,${conf * 0.25})`);
    sweepGrad.addColorStop(1, `rgba(0,210,255,${conf * 0.04})`);
    RCX.fillStyle = sweepGrad;
    RCX.fill();
    RCX.restore();
  }

  // Rings
  [0.35, 0.6, 0.85, 1].forEach((f, i) => {
    RCX.beginPath();
    RCX.arc(cx, cy, 115 * f, 0, Math.PI * 2);
    RCX.strokeStyle = i === 3 ? 'rgba(0,210,255,0.18)' : 'rgba(0,210,255,0.05)';
    RCX.lineWidth = i === 3 ? 1.2 : 0.8;
    RCX.stroke();
  });

  // Cross lines
  RCX.strokeStyle = 'rgba(0,210,255,0.06)';
  RCX.lineWidth = 0.8;
  [0, 45, 90, 135].forEach(deg => {
    const a = (deg * Math.PI) / 180;
    RCX.beginPath();
    RCX.moveTo(cx + Math.cos(a) * 115, cy + Math.sin(a) * 115);
    RCX.lineTo(cx - Math.cos(a) * 115, cy - Math.sin(a) * 115);
    RCX.stroke();
  });

  // Outer ring fill
  RCX.beginPath();
  RCX.arc(cx, cy, 115, 0, Math.PI * 2);
  RCX.fillStyle = 'rgba(0,210,255,0.012)';
  RCX.fill();
}

// ─── SPECTRUM GRAPH ───────────────────────────────────────────────────────────
function drawSpectrum(freqData) {
  const W = SC.width, H = SC.height;
  SCX.clearRect(0, 0, W, H);
  if (!freqData) return;

  // Resize canvas to actual CSS px
  const cssW = SC.clientWidth;
  if (SC.width !== cssW) SC.width = cssW;

  const bins = Math.min(freqData.length, 128);
  const step = SC.width / bins;

  for (let i = 0; i < bins; i++) {
    const norm = Math.max(0, (freqData[i] + 140) / 140);
    const barH = Math.max(1, norm * H);
    const hue = 160 + (i / bins) * 60;
    SCX.fillStyle = `hsla(${hue}, 100%, 60%, 0.55)`;
    SCX.fillRect(i * step, H - barH, Math.max(step - 1, 1), barH);
  }
}

// ─── CROSS-CORRELATION (STEREO) ───────────────────────────────────────────────
// Returns lag in samples between L and R channels.
// Positive lag → sound arrives at L first → source is on LEFT.
// Negative lag → sound arrives at R first → source is on RIGHT.
function crossCorrelate(L, R, maxLag) {
  let bestLag = 0, maxVal = -Infinity;
  const len = L.length;
  for (let lag = -maxLag; lag <= maxLag; lag++) {
    let sum = 0;
    const start = Math.max(0, -lag);
    const end   = Math.min(len, len - lag);
    for (let i = start; i < end; i++) {
      sum += L[i] * R[i + lag];
    }
    if (sum > maxVal) { maxVal = sum; bestLag = lag; }
  }
  return bestLag;
}

// ─── ILD (INTER-AURAL LEVEL DIFFERENCE) ──────────────────────────────────────
// Returns a ratio: +1 = fully left, -1 = fully right
function computeILD(L, R) {
  let pL = 0, pR = 0;
  for (let i = 0; i < L.length; i++) {
    pL += L[i] * L[i];
    pR += R[i] * R[i];
  }
  const rmsL = Math.sqrt(pL / L.length);
  const rmsR = Math.sqrt(pR / R.length);
  const total = rmsL + rmsR;
  if (total < 1e-6) return 0;
  return (rmsL - rmsR) / total;  // +1 = all left, -1 = all right
}

// ─── MAIN AUDIO LOOP ──────────────────────────────────────────────────────────
function mainLoop() {
  if (!isRunning) return;
  rafId = requestAnimationFrame(mainLoop);

  let rms = 0;
  let targetAngle = 90; // 0=left, 90=front, 180=right
  let confidence = 0;

  if (isStereo) {
    const N = anlL.fftSize;
    const tdL = new Float32Array(N);
    const tdR = new Float32Array(N);
    anlL.getFloatTimeDomainData(tdL);
    anlR.getFloatTimeDomainData(tdR);

    const fdL = new Float32Array(anlL.frequencyBinCount);
    anlL.getFloatFrequencyData(fdL);
    drawSpectrum(fdL);

    // RMS from both channels
    let sumSq = 0;
    for (let i = 0; i < N; i++) sumSq += tdL[i]*tdL[i] + tdR[i]*tdR[i];
    rms = Math.sqrt(sumSq / (2 * N));

    if (rms > 0.004) {
      // ── ITD: Inter-aural Time Difference (primary) ──
      const MAX_LAG = Math.round((audioCtx.sampleRate * 0.0007)); // ~0.7ms = max ITD for human head
      const lag = crossCorrelate(tdL, tdR, MAX_LAG);
      const itdRatio = Math.max(-1, Math.min(1, lag / MAX_LAG)); // +1=left, -1=right

      // ── ILD: Inter-aural Level Difference (secondary) ──
      const ildRatio = computeILD(tdL, tdR); // +1=left, -1=right

      // Fuse ITD + ILD (ITD has higher weight for speech; ILD for high freq)
      const fused = itdRatio * 0.65 + ildRatio * 0.35;

      // Map: -1 = right (180°), 0 = center (90°), +1 = left (0°)
      targetAngle = 90 - fused * 88;  // range [2°, 178°]
      confidence = Math.min(0.98, rms * 32 + Math.abs(fused) * 0.2);
    }

  } else {
    // ── MONO MODE: spectral energy weighted toward low frequencies for distance ──
    const N = anlM.fftSize;
    const tdM = new Float32Array(N);
    const fdM = new Float32Array(anlM.frequencyBinCount);
    anlM.getFloatTimeDomainData(tdM);
    anlM.getFloatFrequencyData(fdM);
    drawSpectrum(fdM);

    let sumSq = 0;
    for (let i = 0; i < N; i++) sumSq += tdM[i] * tdM[i];
    rms = Math.sqrt(sumSq / N);

    if (rms > 0.004) {
      // Mono cannot determine left/right. We show volume-proportional
      // proximity on the front axis (90° ± small oscillation based on tone)
      // and notify user about limitation.
      targetAngle = 90;
      confidence = Math.min(0.6, rms * 18);
    }
  }

  // ── Volume smoothing ──
  const volInt = Math.min(100, Math.round(rms * 560));
  if (volInt > maxPeakLevel) maxPeakLevel = volInt;
  sVol += (volInt - sVol) * 0.3;

  const volDisplay = Math.round(sVol);
  document.getElementById('volFill').style.width = volDisplay + '%';
  document.getElementById('volNum').textContent =
    `${volDisplay} / 100 (Zirve: ${maxPeakLevel})`;

  // ── Radar & needle ──
  if (rms > 0.004) {
    // Median filter on angle
    angleBuf[bufIdx % BUF] = targetAngle;
    bufIdx++;
    const sorted = Float32Array.from(angleBuf).sort();
    const med = sorted[Math.floor(BUF / 2)];

    sAngle += (med - sAngle) * 0.22;
    sConf  += (confidence - sConf) * 0.22;

    drawRadar(sAngle, sConf);

    // Rotate needle SVG: 0° = up (ÖN), positive = clockwise (sağ)
    const needleRot = sAngle - 90; // sAngle=90 → needleRot=0 → points up
    NEEDLE_G.setAttribute('transform', `rotate(${needleRot.toFixed(1)}, 135, 135)`);

    const rounded = Math.round(sAngle);
    document.getElementById('angleNum').textContent = rounded;
    document.getElementById('angleNum').classList.toggle('hot', sConf > 0.2);
    document.getElementById('confFill').style.width = Math.round(sConf * 100) + '%';
    document.getElementById('sv1').textContent = '%' + Math.round(sConf * 100);
    document.getElementById('sv2').textContent = maxPeakLevel + ' Pts';
    document.getElementById('dirLabel').textContent = dirText(sAngle);

    // Log throttle
    if (sConf > 0.15 && volInt > 3) {
      const now = Date.now();
      if (now - lastLogTs > 800) {
        lastLogTs = now;
        logEntry(sAngle, sConf, volInt);
      }
    }
  } else {
    drawRadar(sAngle, 0);
    sConf += (0 - sConf) * 0.1;
    document.getElementById('confFill').style.width = Math.round(sConf * 100) + '%';
    document.getElementById('angleNum').classList.remove('hot');
    document.getElementById('statusTxt').textContent = 'Dinleniyor...';
  }
}

// ─── LOG ENTRY ────────────────────────────────────────────────────────────────
function logEntry(angle, conf, vol) {
  const timeStr = new Date().toLocaleTimeString('tr-TR');
  const entry = {
    time: timeStr,
    angle: Math.round(angle),
    conf:  Math.round(conf * 100),
    vol,
    dir:   dirText(angle),
    mode:  isStereo ? 'STEREO' : 'MONO',
    isNew: true
  };
  historyData.unshift(entry);
  if (historyData.length > 50) historyData.pop();
  totalSaved++;
  document.getElementById('sv3').textContent = totalSaved;
  updateHistoryUI();
  if (sheetUrl) sendToSheet(entry);
}

// ─── GOOGLE SHEETS SEND ───────────────────────────────────────────────────────
async function sendToSheet(entry) {
  if (!sheetUrl) return;
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  dot.classList.add('syncing');
  txt.textContent = 'Senkronize...';
  syncPending = true;

  try {
    const resp = await fetch(sheetUrl, {
      method:  'POST',
      mode:    'no-cors', // Apps Script doesn't return CORS headers by default
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        angle:      entry.angle,
        confidence: (entry.conf / 100).toFixed(3),
        volume:     entry.vol,
        direction:  entry.dir,
        mode:       entry.mode,
        timestamp:  entry.time
      })
    });
    // no-cors means response is opaque — assume success if no exception
    showToast('✓ Google Sheets\'e Gönderildi');
    dot.classList.remove('syncing');
    txt.textContent = '✓ Synced';
  } catch (err) {
    showToast('⚠ Sheets bağlantı hatası', true);
    dot.classList.remove('syncing');
    txt.textContent = 'Hata';
  }
  syncPending = false;
}

// ─── HISTORY UI ───────────────────────────────────────────────────────────────
function updateHistoryUI() {
  const container = document.getElementById('histList');
  if (historyData.length === 0) {
    container.innerHTML = '<div class="empty-hint">Veri bekleniyor...</div>';
    return;
  }
  container.innerHTML = historyData.map((h, i) => `
    <div class="h-row ${h.isNew && i === 0 ? 'new' : ''}">
      <span class="h-time">${h.time}</span>
      <span class="h-angle">${h.angle}°</span>
      <span class="h-conf">%${h.conf}</span>
      <span class="h-src">${h.mode}</span>
    </div>
  `).join('');
  // Clear new flag
  if (historyData[0]) historyData[0].isNew = false;
}

function clearLogs() {
  historyData = []; totalSaved = 0; maxPeakLevel = 0;
  sAngle = 90; sConf = 0; sVol = 0;
  document.getElementById('sv3').textContent = '0';
  document.getElementById('sv2').textContent = '—';
  document.getElementById('volNum').textContent = '— / — (Zirve: —)';
  document.getElementById('syncTxt').textContent = '—';
  updateHistoryUI();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  // Force reflow
  t.getBoundingClientRect();
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── MIC TOGGLE ───────────────────────────────────────────────────────────────
async function toggleMic() {
  if (isRunning) {
    stopMic();
    return;
  }

  const btn = document.getElementById('btnMain');
  btn.textContent = '⏳ Bağlanıyor...';
  btn.disabled = true;

  try {
    // ── Step 1: Get microphone access ──────────────────────────────────────
    // iOS Safari requires a plain `audio: true` first; richer constraints may be rejected.
    // We try stereo first, fall back to mono.
    let streamOk = false;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: { ideal: 2, min: 1 },
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          sampleRate: { ideal: 44100 }
        }
      });
      streamOk = true;
    } catch (e1) {
      try {
        // Fallback 1: simplified stereo request
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 2, echoCancellation: false }
        });
        streamOk = true;
      } catch (e2) {
        // Fallback 2: plain mono
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        streamOk = true;
      }
    }

    if (!streamOk) throw new Error('Mikrofon erişimi alınamadı.');

    // ── Step 2: Create AudioContext (MUST be after user gesture) ───────────
    // Do NOT create AudioContext before getUserMedia on iOS — it may suspend.
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: 44100,
      latencyHint: 'interactive'
    });

    // iOS Safari often starts in 'suspended' state — resume it
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    // ── Step 3: Detect actual channel count ────────────────────────────────
    // Note: track.getSettings().channelCount is unreliable on iOS.
    // Instead we check the MediaStreamAudioSourceNode's channelCount after connect.
    srcNode = audioCtx.createMediaStreamSource(micStream);
    const actualChannels = srcNode.channelCount;

    // Also check track settings as secondary hint
    const track = micStream.getAudioTracks()[0];
    const settings = track ? (track.getSettings ? track.getSettings() : {}) : {};
    const trackChannels = settings.channelCount || 1;

    isStereo = actualChannels >= 2 || trackChannels >= 2;

    // ── Step 4: Build analyser graph ────────────────────────────────────────
    if (isStereo) {
      splitterNode = audioCtx.createChannelSplitter(2);
      srcNode.connect(splitterNode);

      anlL = audioCtx.createAnalyser();
      anlR = audioCtx.createAnalyser();
      anlL.fftSize = 2048;
      anlR.fftSize = 2048;
      anlL.smoothingTimeConstant = 0.5;
      anlR.smoothingTimeConstant = 0.5;
      splitterNode.connect(anlL, 0);
      splitterNode.connect(anlR, 1);

      const modeEl = document.getElementById('modeTag');
      modeEl.textContent = 'STEREO AKTİF';
      modeEl.style.color = 'var(--a3)';
      modeEl.style.borderColor = 'rgba(0,255,170,.3)';
      hideAlert();
    } else {
      anlM = audioCtx.createAnalyser();
      anlM.fftSize = 2048;
      anlM.smoothingTimeConstant = 0.5;
      srcNode.connect(anlM);

      const modeEl = document.getElementById('modeTag');
      modeEl.textContent = 'MONO MOD';
      modeEl.style.color = 'var(--warn)';
      modeEl.style.borderColor = 'rgba(255,200,0,.3)';
      showAlert(
        '⚠ Tek kanal (mono) mikrofon tespit edildi. Sol/Sağ yön tespiti yapılamaz. ' +
        'Stereo kulaklık veya harici stereo mikrofon bağlayın.'
      );
    }

    // ── Step 5: Start ─────────────────────────────────────────────────────
    isRunning = true;
    btn.textContent = '■ Durdur';
    btn.classList.add('stop');
    btn.disabled = false;

    const pill = document.getElementById('statusPill');
    pill.classList.add('live');
    document.getElementById('statusTxt').textContent = 'AKUSTİK AKTİF';

    rafId = requestAnimationFrame(mainLoop);

  } catch (err) {
    console.error('Mic error:', err);
    let msg = 'Mikrofon hatası: ' + err.message;
    if (err.name === 'NotAllowedError') msg = 'Mikrofon izni reddedildi. Tarayıcı ayarlarını kontrol edin.';
    if (err.name === 'NotFoundError')   msg = 'Mikrofon bulunamadı.';
    showAlert('❌ ' + msg);
    btn.textContent = '▶ Mikrofonu Başlat';
    btn.disabled = false;
  }
}

function stopMic() {
  isRunning = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close().catch(()=>{});
  srcNode = splitterNode = anlL = anlR = anlM = null;
  audioCtx = null; micStream = null;

  const btn = document.getElementById('btnMain');
  btn.textContent = '▶ Mikrofonu Başlat';
  btn.classList.remove('stop');
  btn.disabled = false;

  const pill = document.getElementById('statusPill');
  pill.classList.remove('live');
  document.getElementById('statusTxt').textContent = 'Hazır';
  document.getElementById('volFill').style.width = '0%';
  document.getElementById('volNum').textContent = '— / — (Zirve: —)';
  document.getElementById('sv1').textContent = '—';
  document.getElementById('angleNum').textContent = '--';
  document.getElementById('dirLabel').textContent = '—';
  document.getElementById('confFill').style.width = '0%';
  document.getElementById('angleNum').classList.remove('hot');
  drawRadar(90, 0);
}

// ─── ORIENTATION SYSTEM ───────────────────────────────────────────────────────
/*
  DeviceOrientationEvent axes (portrait, screen facing you):
    alpha (α) : compass heading 0-360 (yaw)
    beta  (β) : front-back tilt  -180..180
                β ≈  0   → phone flat on table face-up
                β ≈  90  → phone upright (portrait, you look at screen)
                β ≈ -90  → phone upside-down portrait
    gamma (γ) : left-right tilt  -90..90
                γ ≈  0   → phone portrait, no side tilt
                γ ≈  90  → phone landscape right-side down (flat, face up, rotated)

  PLANE DETECTION (what the radar shows):
    |β| < 25°            → FLAT (face up/down) : vertical plane (Up/Down/Front/Back)
    |β| > 65°            → UPRIGHT              : horizontal plane (Left/Right/Front/Back)
    25° ≤ |β| < 65°     → TILTED               : mixed label set

  AUDIO AXIS MAPPING:
    - ITD/ILD from microphone gives LEFT↔RIGHT separation.
    - When UPRIGHT:  horizontal spread → Left/Right/Front/Back labels (normal stereo logic)
    - When FLAT:     horizontal spread of device mics → YUKARIDAN bakış açısı
                     Front of phone (camera edge) = "ÖN", speaker end = "ARKA"
                     Left/Right still valid
    - When TILTED:   interpolate between the two
*/

const OC = document.getElementById('orientCanvas');
const OCX = OC.getContext('2d');

// Current orientation state
let orient = { alpha: 0, beta: 0, gamma: 0, valid: false };
let orientMode = 'upright'; // 'upright' | 'flat' | 'tilted'
let orientSmooth = { beta: 0, gamma: 0 };

// Radar label sets
const LABELS = {
  upright: { N:'ÖN',   S:'ARKA',  W:'SOL',   E:'SAĞ'  },
  flat:    { N:'ÖN',   S:'ARKA',  W:'SOL',   E:'SAĞ'  },
  tilted:  { N:'ÖN',   S:'ARKA',  W:'SOL',   E:'SAĞ'  },
  // flat specifically means device lying down; front camera edge = north
  flat_v:  { N:'YUKARI', S:'AŞAĞI', W:'SOL', E:'SAĞ'  },
};

function updateRadarLabels(mode) {
  const set = mode === 'flat' ? LABELS.flat_v : LABELS.upright;
  document.getElementById('rl_N').textContent = set.N;
  document.getElementById('rl_S').textContent = set.S;
  document.getElementById('rl_W').textContent = set.W;
  document.getElementById('rl_E').textContent = set.E;
}

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawOrientWidget(beta, gamma, mode) {
  const W = 88, H = 88, cx = 44, cy = 44;
  OCX.clearRect(0, 0, W, H);

  // Phone silhouette
  const pw = 18, ph = 30, pr = 3;
  const px = cx - pw/2, py = cy - ph/2;

  // Rotate silhouette based on beta (0=flat, 90=upright)
  // We show a side-view that tilts
  OCX.save();
  OCX.translate(cx, cy);

  // tilt angle for visual: β=90 → 0° rotation (upright = standing), β=0 → 90° (flat = lying)
  const tiltDeg = 90 - Math.max(-90, Math.min(90, beta));
  OCX.rotate((tiltDeg * Math.PI) / 180);

  // Phone body
  roundRectPath(OCX, -pw/2, -ph/2, pw, ph, pr);
  const col = mode === 'upright' ? 'rgba(0,210,255,0.7)' :
               mode === 'flat'   ? 'rgba(0,255,170,0.7)' :
                                   'rgba(255,200,0,0.7)';
  OCX.strokeStyle = col;
  OCX.lineWidth = 1.5;
  OCX.stroke();
  OCX.fillStyle = col.replace('0.7', '0.07');
  OCX.fill();

  // Screen line
  OCX.strokeStyle = col.replace('0.7', '0.3');
  OCX.lineWidth = 0.8;
  roundRectPath(OCX, -pw/2 + 2, -ph/2 + 3, pw - 4, ph - 6, 1);
  OCX.stroke();

  // Home button dot
  OCX.beginPath();
  OCX.arc(0, ph/2 - 3, 1.5, 0, Math.PI * 2);
  OCX.fillStyle = col;
  OCX.fill();

  // Arrow showing up direction
  OCX.strokeStyle = 'rgba(0,210,255,0.5)';
  OCX.lineWidth = 1;
  OCX.beginPath();
  OCX.moveTo(0, -ph/2 - 4);
  OCX.lineTo(0, -ph/2 - 10);
  OCX.stroke();
  OCX.beginPath();
  OCX.moveTo(-3, -ph/2 - 8);
  OCX.lineTo(0, -ph/2 - 12);
  OCX.lineTo(3, -ph/2 - 8);
  OCX.stroke();

  OCX.restore();

  // Side tilt indicator (gamma) — small arc at bottom
  if (Math.abs(gamma) > 5) {
    OCX.save();
    OCX.translate(cx, cy + 16);
    const gArc = (gamma / 90) * (Math.PI / 3);
    OCX.beginPath();
    OCX.arc(0, 0, 10, -Math.PI/2 - gArc, -Math.PI/2, gamma < 0);
    OCX.strokeStyle = 'rgba(255,200,0,0.5)';
    OCX.lineWidth = 1.5;
    OCX.stroke();
    OCX.restore();
  }
}

function classifyOrientation(beta) {
  const ab = Math.abs(beta);
  if (ab > 65)  return 'upright';
  if (ab < 25)  return 'flat';
  return 'tilted';
}

function getModeLabel(mode) {
  if (mode === 'upright') return 'DİK DURUŞ — YAT. DÜZLEM';
  if (mode === 'flat')    return 'YATAY DURUŞ — DİK. DÜZLEM';
  return 'EĞİK DURUŞ — KARMA';
}

function getModeClass(mode) {
  if (mode === 'upright') return 'horiz';
  if (mode === 'flat')    return 'flat';
  return 'vert';
}

// Returns a blend factor 0=upright, 1=flat for axis interpolation
function getFlatBlend(beta) {
  const ab = Math.abs(beta);
  if (ab >= 65) return 0;
  if (ab <= 25) return 1;
  return 1 - (ab - 25) / 40;
}

function onDeviceOrientation(e) {
  if (e.beta === null) return;
  orient.alpha = e.alpha || 0;
  orient.beta  = e.beta  || 0;
  orient.gamma = e.gamma || 0;
  orient.valid = true;

  // Smooth
  orientSmooth.beta  += (orient.beta  - orientSmooth.beta)  * 0.15;
  orientSmooth.gamma += (orient.gamma - orientSmooth.gamma) * 0.15;

  const mode = classifyOrientation(orientSmooth.beta);
  orientMode = mode;

  // Update widget
  drawOrientWidget(orientSmooth.beta, orientSmooth.gamma, mode);

  // Update labels
  updateRadarLabels(mode);

  // Update text
  const modeEl = document.getElementById('orientMode');
  modeEl.textContent = getModeLabel(mode);
  modeEl.className = 'orient-mode ' + getModeClass(mode);

  document.getElementById('orientAngles').textContent =
    `β:${Math.round(orientSmooth.beta)}° γ:${Math.round(orientSmooth.gamma)}° α:${Math.round(orient.alpha)}°`;
}

async function requestOrientPerm() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        window.addEventListener('deviceorientation', onDeviceOrientation, true);
        document.getElementById('btnPerm').style.display = 'none';
        document.getElementById('orientPerm').classList.remove('show');
        showToast('✓ Yönelim sensörü aktif');
      } else {
        showToast('❌ İzin reddedildi', true);
      }
    } catch(e) {
      showToast('❌ İzin hatası: ' + e.message, true);
    }
  }
}

function initOrientation() {
  // iOS 13+ requires explicit permission
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('btnPerm').style.display = 'inline-block';
    document.getElementById('orientPerm').classList.add('show');
    document.getElementById('orientPerm').textContent = '⚠ iOS: Sensör izni gerekli →';
  } else if (window.DeviceOrientationEvent) {
    // Android / desktop — no permission needed
    window.addEventListener('deviceorientation', onDeviceOrientation, true);
    document.getElementById('orientMode').textContent = 'SENSÖR AKTİF';
    document.getElementById('orientMode').className = 'orient-mode horiz';
  } else {
    document.getElementById('orientMode').textContent = 'SENSÖR YOK';
    document.getElementById('orientAngles').textContent = 'Cihaz sensörü bulunamadı';
  }
}

// Draw initial widget
drawOrientWidget(90, 0, 'upright');
initOrientation();

// ─── DIRECTION TEXT (orientation-aware) ───────────────────────────────────────
function dirText(a) {
  if (!isStereo) return 'MONO — YÖN SINIRLI';

  const blend = orient.valid ? getFlatBlend(orientSmooth.beta) : 0;

  if (blend > 0.6) {
    // FLAT MODE — vertical plane labels
    if (a < 22)  return '◀◀ KESKİN SOL';
    if (a < 60)  return '↖ SOL YUKARI';
    if (a < 80)  return '↑ YUKARI SOL';
    if (a < 100) return '↑ DOĞRUDAN YUKARI';
    if (a < 120) return '↑ YUKARI SAĞ';
    if (a < 158) return '↗ SAĞ YUKARI';
    return 'KESKİN SAĞ ▶▶';
  } else {
    // UPRIGHT MODE — horizontal plane labels
    if (a < 22)  return '◀◀ KESKİN SOL';
    if (a < 60)  return '◀ SOL ÖN';
    if (a < 80)  return '↖ HAFİF SOL';
    if (a < 100) return '↑ MERKEZ ÖN';
    if (a < 120) return '↗ HAFİF SAĞ';
    if (a < 158) return 'SAĞ ÖN ▶';
    return 'KESKİN SAĞ ▶▶';
  }
}

// Initial radar draw
drawRadar(90, 0);
</script>
